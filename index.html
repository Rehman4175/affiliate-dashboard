<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affiliate Marketing Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      padding: 30px 0;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    .header p {
      color: #8892b0;
      font-size: 1.1rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
    }
    
    .stat-card h3 {
      color: #8892b0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    
    .stat-card .value {
      font-size: 2.5rem;
      font-weight: bold;
      color: #e94560;
    }
    
    .stat-card .subtitle {
      color: #64ffda;
      font-size: 0.9rem;
      margin-top: 5px;
    }
    
    .charts-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .chart-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .chart-card h3 {
      margin-bottom: 20px;
      color: #fff;
    }
    
    .table-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 30px;
      overflow-x: auto;
    }
    
    .table-section h3 {
      margin-bottom: 20px;
      color: #fff;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    th {
      background: rgba(233, 69, 96, 0.2);
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    
    tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .status-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    
    .status-active {
      background: rgba(100, 255, 218, 0.2);
      color: #64ffda;
    }
    
    .status-pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }
    
    .status-error {
      background: rgba(233, 69, 96, 0.2);
      color: #e94560;
    }
    
    .refresh-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 50px;
      padding: 15px 30px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
      transition: transform 0.3s ease;
    }
    
    .refresh-btn:hover {
      transform: scale(1.05);
    }
    
    .loading {
      text-align: center;
      padding: 50px;
      color: #8892b0;
    }
    
    .agent-status {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    
    .agent-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 15px;
      min-width: 200px;
      border-left: 4px solid #64ffda;
    }
    
    .agent-card.error {
      border-left-color: #e94560;
    }
    
    .agent-card h4 {
      margin-bottom: 10px;
      color: #fff;
    }
    
    .agent-card p {
      color: #8892b0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>Affiliate Marketing Dashboard</h1>
      <p>Real-time tracking of your automated affiliate system</p>
    </div>
    
    <div class="stats-grid" id="statsGrid">
      <div class="loading">Loading dashboard...</div>
    </div>
    
    <div class="charts-section">
      <div class="chart-card">
        <h3>Daily Clicks</h3>
        <canvas id="clicksChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Revenue by Niche</h3>
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
    
    <div class="table-section">
      <h3>Top Performing Posts</h3>
      <table id="postsTable">
        <thead>
          <tr>
            <th>Title</th>
            <th>Niche</th>
            <th>Clicks</th>
            <th>Saves</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="postsBody">
          <tr><td colspan="5" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    
    <div class="table-section">
      <h3>Recent Income</h3>
      <table id="incomeTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Niche</th>
            <th>Program</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="incomeBody">
          <tr><td colspan="5" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    
    <div class="table-section">
      <h3>Agent Status</h3>
      <div class="agent-status" id="agentStatus">
        <div class="loading">Loading agents...</div>
      </div>
    </div>
  </div>
  
  <button class="refresh-btn" onclick="refreshDashboard()">Refresh Data</button>
  
  <script>
    // Charts
    let clicksChart, revenueChart;
    
    // Initialize dashboard
    async function initDashboard() {
      await refreshDashboard();
    }
    
    // Refresh all dashboard data
    async function refreshDashboard() {
      try {
        // Get summary data
        const summary = await google.script.run
          .withSuccessHandler(updateStats)
          .withFailureHandler(handleError)
          .getDashboardSummary();
        
        // Get analytics for charts
        const analytics = await google.script.run
          .withSuccessHandler(updateCharts)
          .withFailureHandler(handleError)
          .getDailyAnalytics(30);
        
        // Get top posts
        const posts = await google.script.run
          .withSuccessHandler(updatePostsTable)
          .withFailureHandler(handleError)
          .getTopPosts(10);
        
        // Get income
        const income = await google.script.run
          .withSuccessHandler(updateIncomeTable)
          .withFailureHandler(handleError)
          .getDashboardSummary();
        
        // Get agent status
        const agents = await google.script.run
          .withSuccessHandler(updateAgentStatus)
          .withFailureHandler(handleError)
          .getAgentStatus();
        
      } catch (error) {
        console.error('Dashboard error:', error);
      }
    }
    
    // Update stats cards
    function updateStats(data) {
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = `
        <div class="stat-card">
          <h3>Active Niches</h3>
          <div class="value">${data.activeNiches}</div>
          <div class="subtitle">of ${data.totalNiches} total</div>
        </div>
        <div class="stat-card">
          <h3>Total Posts</h3>
          <div class="value">${data.totalPosts}</div>
          <div class="subtitle">Published pins</div>
        </div>
        <div class="stat-card">
          <h3>Total Revenue</h3>
          <div class="value">$${data.totalRevenue}</div>
          <div class="subtitle">All-time earnings</div>
        </div>
        <div class="stat-card">
          <h3>Active Agents</h3>
          <div class="value">${data.activeAgents}</div>
          <div class="subtitle">Running now</div>
        </div>
      `;
    }
    
    // Update charts
    function updateCharts(analytics) {
      // Clicks chart
      const clicksCtx = document.getElementById('clicksChart').getContext('2d');
      if (clicksChart) clicksChart.destroy();
      
      clicksChart = new Chart(clicksCtx, {
        type: 'line',
        data: {
          labels: analytics.map(a => a.date),
          datasets: [{
            label: 'Clicks',
            data: analytics.map(a => a.clicks),
            borderColor: '#e94560',
            backgroundColor: 'rgba(233, 69, 96, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: '#fff' } }
          },
          scales: {
            x: { ticks: { color: '#8892b0' }, grid: { color: 'rgba(255,255,255,0.1)' } },
            y: { ticks: { color: '#8892b0' }, grid: { color: 'rgba(255,255,255,0.1)' } }
          }
        }
      });
      
      // Revenue chart
      const revenueCtx = document.getElementById('revenueChart').getContext('2d');
      if (revenueChart) revenueChart.destroy();
      
      revenueChart = new Chart(revenueCtx, {
        type: 'doughnut',
        data: {
          labels: ['Revenue', 'Remaining'],
          datasets: [{
            data: [parseFloat(analytics.reduce((sum, a) => sum + parseFloat(a.revenue), 0).toFixed(2)) || 0, 100],
            backgroundColor: ['#64ffda', 'rgba(255,255,255,0.1)']
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: '#fff' } }
          }
        }
      });
    }
    
    // Update posts table
    function updatePostsTable(posts) {
      const tbody = document.getElementById('postsBody');
      if (!posts || posts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#8892b0;">No posts yet</td></tr>';
        return;
      }
      
      tbody.innerHTML = posts.map(post => `
        <tr>
          <td>${post.Title || 'Untitled'}</td>
          <td>${post.Niche || '-'}</td>
          <td>${post.totalClicks || 0}</td>
          <td>${post.totalSaves || 0}</td>
          <td><span class="status-badge status-${(post.Status || 'pending').toLowerCase()}">${post.Status || 'Pending'}</span></td>
        </tr>
      `).join('');
    }
    
    // Update income table
    function updateIncomeTable(data) {
      const tbody = document.getElementById('incomeBody');
      const income = data.recentIncome || [];
      
      if (income.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#8892b0;">No income yet</td></tr>';
        return;
      }
      
      tbody.innerHTML = income.map(row => `
        <tr>
          <td>${row.Date || '-'}</td>
          <td>${row.Niche || '-'}</td>
          <td>${row.Program || '-'}</td>
          <td>$${row.Amount || '0.00'}</td>
          <td><span class="status-badge status-${(row.Status || 'pending').toLowerCase()}">${row.Status || 'Pending'}</span></td>
        </tr>
      `).join('');
    }
    
    // Update agent status
    function updateAgentStatus(agents) {
      const container = document.getElementById('agentStatus');
      
      if (!agents || agents.length === 0) {
        container.innerHTML = '<div class="loading">No agents running</div>';
        return;
      }
      
      container.innerHTML = agents.map(agent => `
        <div class="agent-card ${agent.status === 'error' ? 'error' : ''}">
          <h4>${agent.name}</h4>
          <p>Niche: ${agent.niche}</p>
          <p>Status: ${agent.status}</p>
          <p>Pins: ${agent.pinsCreated || 0}</p>
          <p>Last Run: ${agent.lastRun || 'Never'}</p>
        </div>
      `).join('');
    }
    
    // Handle errors
    function handleError(error) {
      console.error('Error:', error);
    }
    
    // Initialize on load
    document.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
</html>
