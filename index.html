<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Agent Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px 30px; background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 16px; border: 1px solid #334155; flex-wrap: wrap; gap: 15px; }
        header h1 { font-size: 28px; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-right { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .live-datetime { background: #0f172a; padding: 10px 20px; border-radius: 10px; border: 1px solid #334155; font-family: monospace; color: #34d399; font-size: 14px; }
        .live-indicator { display: inline-block; width: 10px; height: 10px; background: #34d399; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .refresh-btn { padding: 12px 24px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .refresh-btn:hover { transform: scale(1.05); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 24px; border-radius: 16px; text-align: center; border: 1px solid #334155; }
        .stat-card .icon { font-size: 32px; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: 700; }
        .stat-card .label { font-size: 13px; color: #94a3b8; margin-top: 6px; }
        .stat-card.blue .number { color: #60a5fa; }
        .stat-card.green .number { color: #34d399; }
        .stat-card.yellow .number { color: #fbbf24; }
        .stat-card.red .number { color: #f87171; }
        .stat-card.purple .number { color: #a78bfa; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .section { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 16px; margin-bottom: 24px; border: 1px solid #334155; }
        .section-header { padding: 18px 24px; border-bottom: 1px solid #334155; }
        .section-header h2 { font-size: 18px; color: #f1f5f9; }
        .section-body { padding: 20px; }
        .chart-container { position: relative; height: 300px; }
        .niche-card { background: #0f172a; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .niche-card h3 { color: #60a5fa; margin-bottom: 15px; font-size: 16px; }
        .niche-stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
        .niche-stat:last-child { border-bottom: none; }
        .post-item { background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 10px; }
        .post-item h4 { color: #60a5fa; margin-bottom: 5px; }
        .post-item .meta { color: #94a3b8; font-size: 12px; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .status-bar { background: #1e293b; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        a { color: #60a5fa; text-decoration: none; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; display: inline-block; margin: 5px; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .btn-success { background: #065f46; color: #34d399; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display:flex;align-items:center;gap:15px;">
                <h1>Affiliate Agent Dashboard</h1>
                <span class="live-indicator"></span>
                <span style="color:#94a3b8;font-size:13px;">LIVE</span>
            </div>
            <div class="header-right">
                <div class="live-datetime" id="liveDateTime">Loading...</div>
                <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">Refresh Data</button>
            </div>
        </header>
        
        <div class="status-bar">
            <span style="color:#94a3b8;">Last Updated: <span id="lastUpdated">Loading...</span></span>
            <span style="color:#34d399;" id="refreshStatus">Click Refresh for latest data</span>
        </div>
        
        <div id="dashboardContent">
            <div class="loading">Loading dashboard data...</div>
        </div>
    </div>
    
    <script>
        let chartInstances = {};
        
        // Live DateTime
        function updateDateTime() {
            const now = new Date();
            document.getElementById('liveDateTime').textContent = now.toLocaleDateString('en-US', {
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // Load data from JSON
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                const data = await response.json();
                renderDashboard(data);
                document.getElementById('lastUpdated').textContent = data.updated_at;
            } catch (error) {
                document.getElementById('dashboardContent').innerHTML = 
                    '<div class="loading">Error loading data. Make sure data.json exists.</div>';
            }
        }
        
        // Refresh data
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const status = document.getElementById('refreshStatus');
            btn.disabled = true;
            btn.textContent = 'Refreshing...';
            status.textContent = 'Fetching latest data...';
            status.style.color = '#fbbf24';
            
            await loadData();
            
            btn.disabled = false;
            btn.textContent = 'Refresh Data';
            status.textContent = 'Data updated!';
            status.style.color = '#34d399';
            setTimeout(() => { status.textContent = 'Click Refresh for latest data'; }, 3000);
        }
        
        // Render dashboard
        function renderDashboard(data) {
            const stats = data.stats;
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card blue">
                        <div class="icon">📝</div>
                        <div class="number">${stats.total_drafts}</div>
                        <div class="label">Total Drafts</div>
                    </div>
                    <div class="stat-card green">
                        <div class="icon">✅</div>
                        <div class="number">${stats.published}</div>
                        <div class="label">Published</div>
                    </div>
                    <div class="stat-card yellow">
                        <div class="icon">⏳</div>
                        <div class="number">${stats.pending}</div>
                        <div class="label">Pending</div>
                    </div>
                    <div class="stat-card red">
                        <div class="icon">👁️</div>
                        <div class="number">${stats.total_views}</div>
                        <div class="label">Total Views</div>
                    </div>
                    <div class="stat-card purple">
                        <div class="icon">🔗</div>
                        <div class="number">${stats.total_programs}</div>
                        <div class="label">Affiliate Programs</div>
                    </div>
                    <div class="stat-card green">
                        <div class="icon">💰</div>
                        <div class="number">${stats.estimated_revenue}</div>
                        <div class="label">Est. Revenue</div>
                    </div>
                </div>
                
                <div class="grid-2">
                    <div class="section">
                        <div class="section-header"><h2>📊 Posts by Niche</h2></div>
                        <div class="section-body">
                            <div class="chart-container"><canvas id="nicheChart"></canvas></div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-header"><h2>📈 Content Status</h2></div>
                        <div class="section-body">
                            <div class="chart-container"><canvas id="statusChart"></canvas></div>
                        </div>
                    </div>
                </div>
                
                <div class="grid-3">
                    ${data.niches.map(n => `
                        <div class="niche-card">
                            <h3>${n.name}</h3>
                            <div class="niche-stat"><span>Drafts</span><span>${n.drafts}</span></div>
                            <div class="niche-stat"><span>Published</span><span>${n.published}</span></div>
                            <div class="niche-stat"><span>Programs</span><span>${n.programs}</span></div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="section">
                    <div class="section-header"><h2>📝 Recent Published Posts</h2></div>
                    <div class="section-body">
                        ${data.recent_posts.length > 0 ? data.recent_posts.map(p => `
                            <div class="post-item">
                                <h4><a href="${p.published_url}" target="_blank">${p.title}</a></h4>
                                <div class="meta">${p.niche_name || 'N/A'} | ${p.created_at || 'N/A'}</div>
                            </div>
                        `).join('') : '<p style="color:#94a3b8;">No published posts yet</p>'}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-header"><h2>⚡ Quick Links</h2></div>
                    <div class="section-body">
                        <a href="http://rkpicks.blogspot.com" target="_blank" class="btn btn-primary">View Blog</a>
                        <a href="https://github.com/Rehman4175/affiliate-agent" target="_blank" class="btn btn-primary">GitHub Repo</a>
                        <a href="https://github.com/Rehman4175/affiliate-agent/actions" target="_blank" class="btn btn-success">GitHub Actions</a>
                    </div>
                </div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = html;
            
            // Render charts
            renderCharts(data);
        }
        
        function renderCharts(data) {
            // Destroy existing charts
            if (chartInstances.niche) chartInstances.niche.destroy();
            if (chartInstances.status) chartInstances.status.destroy();
            
            // Niche Chart
            const nicheCtx = document.getElementById('nicheChart');
            if (nicheCtx) {
                chartInstances.niche = new Chart(nicheCtx.getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: data.niches.map(n => n.name.substring(0, 15)),
                        datasets: [
                            { label: 'Published', data: data.niches.map(n => n.published), backgroundColor: '#34d399' },
                            { label: 'Drafts', data: data.niches.map(n => n.drafts), backgroundColor: '#60a5fa' }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#94a3b8' } } },
                        scales: {
                            x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                            y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                        }
                    }
                });
            }
            
            // Status Chart
            const statusCtx = document.getElementById('statusChart');
            if (statusCtx) {
                chartInstances.status = new Chart(statusCtx.getContext('2d'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Published', 'Pending'],
                        datasets: [{
                            data: [data.stats.published, data.stats.pending],
                            backgroundColor: ['#34d399', '#fbbf24']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#94a3b8' } } }
                    }
                });
            }
        }
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 5 minutes
        setInterval(loadData, 300000);
    </script>
</body>
</html>
